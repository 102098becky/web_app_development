{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow mt-4 border-0">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                <h4 class="mb-0 text-center fw-bold text-primary">新增記帳本</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('ledger_bp.create_ledger') }}" method="POST">
                    <div class="mb-4">
                        <label for="name" class="form-label text-secondary">記帳本名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg bg-light" id="name" name="name" placeholder="例如：日常開銷、去日本玩" required autofocus>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">建立記帳本</button>
                        <a href="{{ url_for('tx_bp.dashboard') }}" class="btn btn-light">取消並回首頁</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
